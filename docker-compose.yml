services:
  db:
    container_name: blog-db
    image: postgres:16
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_PORT=${DATABASE_PORT} 
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always
    ports:
      - "${DATABASE_PORT}:${DATABASE_PORT}"
    networks:
      - blog-networks

networks:
  blog-networks:
    driver: bridge

volumes:
  db_data: